<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" width="1200" height="660" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1117"/>
      <stop offset="100%" style="stop-color:#1a1d2e"/>
    </linearGradient>
    <linearGradient id="aws-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1a0d"/>
      <stop offset="100%" style="stop-color:#0a150a"/>
    </linearGradient>
    <linearGradient id="dev-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d1a"/>
      <stop offset="100%" style="stop-color:#0a0a14"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
    </marker>
    <marker id="arr-g" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4ade80"/>
    </marker>
    <marker id="arr-o" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#fb923c"/>
    </marker>
    <marker id="arr-b" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4a9eff"/>
    </marker>
    <marker id="arr-p" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#c084fc"/>
    </marker>
    <style>
      .fa  { stroke-dasharray:7 4; animation: d 1.8s linear infinite; }
      .fa2 { stroke-dasharray:5 4; animation: d 2.4s linear infinite; }
      @keyframes d { to { stroke-dashoffset:-22; } }
    </style>
  </defs>

  <rect width="1200" height="660" fill="url(#bg)" rx="12"/>
  <text x="600" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#e2e8f0">Infrastructure &amp; Deployment Pipeline</text>
  <text x="600" y="48" text-anchor="middle" font-size="11" fill="#64748b">Terraform · Docker · ECR · AWS Bedrock AgentCore · Observability</text>
  <line x1="20" y1="56" x2="1180" y2="56" stroke="#334155" stroke-width="1"/>

  <!-- ══════════════ DEV MACHINE ══════════════ -->
  <rect x="20" y="64" width="235" height="338" rx="12" fill="url(#dev-bg)" stroke="#6366f1" stroke-width="2"/>
  <text x="137" y="84" text-anchor="middle" font-size="12" font-weight="700" fill="#a5b4fc">Developer Machine</text>

  <!-- build-and-push.sh -->
  <rect x="36" y="96" width="204" height="80" rx="7" fill="#1e1e3a" stroke="#fb923c" stroke-width="1.2"/>
  <text x="138" y="115" text-anchor="middle" font-size="10" font-weight="600" fill="#fdba74">./build-and-push.sh</text>
  <text x="138" y="131" text-anchor="middle" font-size="9" fill="#64748b">./gradlew clean build</text>
  <text x="138" y="145" text-anchor="middle" font-size="9" fill="#64748b">Multi-stage Dockerfile · ARM64</text>
  <text x="138" y="159" text-anchor="middle" font-size="9" fill="#64748b">Native or QEMU cross-build → ECR</text>

  <!-- deploy.sh -->
  <rect x="36" y="188" width="204" height="100" rx="7" fill="#1e1e3a" stroke="#4ade80" stroke-width="1.2"/>
  <text x="138" y="207" text-anchor="middle" font-size="10" font-weight="600" fill="#86efac">./deploy.sh [--clean]</text>
  <text x="138" y="222" text-anchor="middle" font-size="9" fill="#64748b">--clean: delete runtime + tf state rm</text>
  <text x="138" y="236" text-anchor="middle" font-size="9" fill="#64748b">terraform init / plan / apply</text>
  <text x="138" y="250" text-anchor="middle" font-size="9" fill="#64748b">Cognito · IAM · AgentCore</text>
  <text x="138" y="264" text-anchor="middle" font-size="9" fill="#64748b">Post-apply: sync runtime_id_suffix</text>
  <text x="138" y="278" text-anchor="middle" font-size="9" fill="#64748b">X-Ray · CloudWatch log delivery</text>

  <!-- update-runtime-suffix.sh -->
  <rect x="36" y="300" width="204" height="24" rx="5" fill="#1e1e3a" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="138" y="316" text-anchor="middle" font-size="9" fill="#94a3b8">./update-runtime-suffix.sh</text>

  <!-- Terraform files note -->
  <rect x="36" y="332" width="204" height="26" rx="5" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="138" y="349" text-anchor="middle" font-size="8.5" fill="#475569">main.tf · memory.tf · observability.tf · variables.tf · outputs.tf</text>

  <!-- ══════════════ AWS CLOUD ══════════════ -->
  <rect x="275" y="64" width="905" height="510" rx="12" fill="url(#aws-bg)" stroke="#f59e0b" stroke-width="2"/>
  <text x="727" y="83" text-anchor="middle" font-size="12" font-weight="700" fill="#fbbf24">AWS Cloud (us-east-1)</text>

  <!-- ECR -->
  <rect x="293" y="98" width="138" height="78" rx="8" fill="#201508" stroke="#fb923c" stroke-width="1.5"/>
  <text x="362" y="119" text-anchor="middle" font-size="11" font-weight="600" fill="#fdba74">Amazon ECR</text>
  <text x="362" y="138" text-anchor="middle" font-size="18">📦</text>
  <text x="362" y="162" text-anchor="middle" font-size="9" fill="#94a3b8">spring-genai-&lt;acct&gt; image</text>

  <!-- Cognito -->
  <rect x="443" y="98" width="138" height="78" rx="8" fill="#201508" stroke="#fb923c" stroke-width="1.5"/>
  <text x="512" y="119" text-anchor="middle" font-size="11" font-weight="600" fill="#fdba74">AWS Cognito</text>
  <text x="512" y="138" text-anchor="middle" font-size="18">🔐</text>
  <text x="512" y="162" text-anchor="middle" font-size="9" fill="#94a3b8">User Pool + Client</text>

  <!-- IAM -->
  <rect x="593" y="98" width="138" height="78" rx="8" fill="#0d2040" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="662" y="119" text-anchor="middle" font-size="11" font-weight="600" fill="#93c5fd">AWS IAM</text>
  <text x="662" y="138" text-anchor="middle" font-size="18">🛡️</text>
  <text x="662" y="162" text-anchor="middle" font-size="9" fill="#94a3b8">AgentCore exec role</text>

  <!-- AgentCore Memory -->
  <rect x="743" y="98" width="148" height="78" rx="8" fill="#2d1a4d" stroke="#c084fc" stroke-width="1.5"/>
  <text x="817" y="119" text-anchor="middle" font-size="11" font-weight="600" fill="#e9d5ff">AgentCore Memory</text>
  <text x="817" y="138" text-anchor="middle" font-size="18">🧠</text>
  <text x="817" y="162" text-anchor="middle" font-size="9" fill="#94a3b8">30-day TTL · Events API</text>

  <!-- OTEL env config panel -->
  <rect x="903" y="98" width="265" height="132" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1.2"/>
  <text x="1035" y="117" text-anchor="middle" font-size="10" font-weight="600" fill="#94a3b8">OTEL Configuration (Terraform env vars)</text>
  <text x="1035" y="133" text-anchor="middle" font-size="8.5" fill="#4ade80">OTEL_TRACES_EXPORTER=otlp → X-Ray OTLP endpoint</text>
  <text x="1035" y="147" text-anchor="middle" font-size="8.5" fill="#4a9eff">OTEL_LOGS_EXPORTER=otlp → CloudWatch OTLP endpoint</text>
  <text x="1035" y="161" text-anchor="middle" font-size="8.5" fill="#ef4444">OTEL_METRICS_EXPORTER=none  (disabled)</text>
  <text x="1035" y="175" text-anchor="middle" font-size="8.5" fill="#64748b">OTEL_RESOURCE_ATTRIBUTES: service.name,</text>
  <text x="1035" y="188" text-anchor="middle" font-size="8.5" fill="#64748b">  cloud.resource_id (GenAI dashboard), aws.log.group.names</text>
  <text x="1035" y="202" text-anchor="middle" font-size="8.5" fill="#64748b">SPRING_PROFILES_ACTIVE=production</text>
  <text x="1035" y="216" text-anchor="middle" font-size="8.5" fill="#64748b">OTEL_AWS_APPLICATION_SIGNALS_ENABLED=false</text>

  <!-- AgentCore Runtime boundary -->
  <rect x="293" y="195" width="600" height="170" rx="10" fill="#0a180a" stroke="#22c55e" stroke-width="2" stroke-dasharray="7 4"/>
  <text x="593" y="214" text-anchor="middle" font-size="11" font-weight="600" fill="#4ade80">AWS Bedrock AgentCore Runtime (isolated microVM · ARM64)</text>

  <!-- Docker container -->
  <rect x="308" y="226" width="570" height="126" rx="8" fill="#0d1a0d" stroke="#16a34a" stroke-width="1.2"/>
  <text x="593" y="245" text-anchor="middle" font-size="10" font-weight="600" fill="#86efac">Docker Container — spring-genai (pulled from ECR)</text>

  <!-- Corretto -->
  <rect x="322" y="254" width="150" height="84" rx="6" fill="#1a2a1a" stroke="#4ade80" stroke-width="1"/>
  <text x="397" y="272" text-anchor="middle" font-size="9" font-weight="600" fill="#86efac">Amazon Corretto 25-Alpine</text>
  <text x="397" y="287" text-anchor="middle" font-size="9" fill="#64748b">Virtual threads</text>
  <text x="397" y="301" text-anchor="middle" font-size="9" fill="#64748b">Port 8080 · non-root: appuser</text>
  <text x="397" y="315" text-anchor="middle" font-size="9" fill="#64748b">JarLauncher (layered JAR)</text>
  <text x="397" y="329" text-anchor="middle" font-size="9" fill="#64748b">WORKDIR /app</text>

  <!-- Spring Boot layers -->
  <rect x="484" y="254" width="155" height="84" rx="6" fill="#1a1a2e" stroke="#6366f1" stroke-width="1"/>
  <text x="561" y="272" text-anchor="middle" font-size="9" font-weight="600" fill="#a5b4fc">Spring Boot App</text>
  <text x="561" y="287" text-anchor="middle" font-size="9" fill="#64748b">4-layer JAR extract:</text>
  <text x="561" y="301" text-anchor="middle" font-size="9" fill="#64748b">dependencies /</text>
  <text x="561" y="315" text-anchor="middle" font-size="9" fill="#64748b">spring-boot-loader /</text>
  <text x="561" y="329" text-anchor="middle" font-size="9" fill="#64748b">snapshot-deps / application</text>

  <!-- ADOT Agent -->
  <rect x="651" y="254" width="218" height="84" rx="6" fill="#201508" stroke="#fb923c" stroke-width="1"/>
  <text x="760" y="272" text-anchor="middle" font-size="9" font-weight="600" fill="#fdba74">ADOT Java Agent v2.23.0</text>
  <text x="760" y="287" text-anchor="middle" font-size="9" fill="#64748b">JAVA_TOOL_OPTIONS:</text>
  <text x="760" y="301" text-anchor="middle" font-size="8.5" fill="#64748b">-javaagent:/app/aws-opentelemetry-agent.jar</text>
  <text x="760" y="315" text-anchor="middle" font-size="8.5" fill="#64748b">logback/jul instrumentation disabled</text>
  <text x="760" y="329" text-anchor="middle" font-size="8.5" fill="#64748b">OTLP_PROTOCOL=http/protobuf</text>

  <!-- AWS Bedrock -->
  <rect x="293" y="383" width="165" height="100" rx="8" fill="#1a3d2b" stroke="#4ade80" stroke-width="1.5"/>
  <text x="375" y="405" text-anchor="middle" font-size="11" font-weight="600" fill="#86efac">AWS Bedrock</text>
  <text x="375" y="424" text-anchor="middle" font-size="18">🤖</text>
  <text x="375" y="447" text-anchor="middle" font-size="9" fill="#94a3b8">Nova Lite inference</text>
  <text x="375" y="461" text-anchor="middle" font-size="9" fill="#64748b">Converse Stream API</text>
  <text x="375" y="474" text-anchor="middle" font-size="9" fill="#64748b">us.amazon.nova-lite-v1:0</text>

  <!-- X-Ray -->
  <rect x="470" y="383" width="240" height="145" rx="8" fill="#201508" stroke="#fb923c" stroke-width="1.5"/>
  <text x="590" y="403" text-anchor="middle" font-size="11" font-weight="600" fill="#fdba74">AWS X-Ray</text>
  <text x="590" y="421" text-anchor="middle" font-size="16">🔭</text>
  <text x="590" y="440" text-anchor="middle" font-size="9" fill="#94a3b8">Distributed Tracing</text>
  <text x="590" y="454" text-anchor="middle" font-size="9" fill="#64748b">OTLP → xray OTLP endpoint (ADOT)</text>
  <text x="590" y="468" text-anchor="middle" font-size="9" fill="#64748b">TRACES vended delivery (Terraform)</text>
  <text x="590" y="482" text-anchor="middle" font-size="9" fill="#64748b">aws_xray_group (Insights enabled)</text>
  <text x="590" y="496" text-anchor="middle" font-size="9" fill="#64748b">aws_xray_sampling_rule (100% fixed rate)</text>
  <text x="590" y="510" text-anchor="middle" font-size="9" fill="#64748b">Transaction Search → /aws/spans CW log group</text>
  <text x="590" y="522" text-anchor="middle" font-size="8" fill="#475569">(CLI: update-trace-segment-destination + update-indexing-rule)</text>

  <!-- CloudWatch Logs -->
  <rect x="722" y="383" width="240" height="145" rx="8" fill="#0d2040" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="842" y="403" text-anchor="middle" font-size="11" font-weight="600" fill="#93c5fd">CloudWatch Logs</text>
  <text x="842" y="421" text-anchor="middle" font-size="16">📋</text>
  <text x="842" y="440" text-anchor="middle" font-size="9" fill="#94a3b8">Structured Logs</text>
  <text x="842" y="454" text-anchor="middle" font-size="9" fill="#64748b">OTLP Logback appender (ADOT)</text>
  <text x="842" y="468" text-anchor="middle" font-size="9" fill="#64748b">APPLICATION_LOGS vended delivery</text>
  <text x="842" y="482" text-anchor="middle" font-size="9" fill="#64748b">/aws/vendedlogs/bedrock-agentcore/...</text>
  <text x="842" y="496" text-anchor="middle" font-size="9" fill="#64748b">Native log group: /aws/bedrock-agentcore/</text>
  <text x="842" y="510" text-anchor="middle" font-size="9" fill="#64748b">  runtimes/&lt;runtime_id&gt;-DEFAULT</text>
  <text x="842" y="524" text-anchor="middle" font-size="9" fill="#64748b">Retention: 30 days</text>

  <!-- OTEL Metrics disabled note (where CW Metrics used to be) -->
  <rect x="974" y="383" width="188" height="75" rx="8" fill="#1a0a0a" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="5 3"/>
  <text x="1068" y="403" text-anchor="middle" font-size="10" font-weight="600" fill="#f87171">CW Metrics</text>
  <text x="1068" y="419" text-anchor="middle" font-size="16">🚫</text>
  <text x="1068" y="440" text-anchor="middle" font-size="9" fill="#ef4444">OTEL_METRICS_EXPORTER=none</text>
  <text x="1068" y="454" text-anchor="middle" font-size="9" fill="#64748b">Metrics export disabled.</text>

  <!-- Terraform label bar -->
  <rect x="293" y="540" width="870" height="26" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="728" y="558" text-anchor="middle" font-size="10" fill="#64748b">Provisioned by Terraform  |  main.tf · memory.tf · observability.tf · variables.tf · outputs.tf</text>

  <!-- ══════════════ LOCAL DEV STACK ══════════════ -->
  <rect x="20" y="390" width="235" height="178" rx="12" fill="#0a0a14" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="137" y="410" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8">Local Dev Stack</text>
  <text x="137" y="425" text-anchor="middle" font-size="9" fill="#475569">docker-compose.yml</text>

  <rect x="35" y="435" width="98" height="38" rx="5" fill="#1a1a1a" stroke="#64748b" stroke-width="1"/>
  <text x="84" y="450" text-anchor="middle" font-size="9" fill="#94a3b8">OTel Collector</text>
  <text x="84" y="464" text-anchor="middle" font-size="8" fill="#475569">:4317 / :4318</text>

  <rect x="143" y="435" width="98" height="38" rx="5" fill="#1a1a1a" stroke="#64748b" stroke-width="1"/>
  <text x="192" y="450" text-anchor="middle" font-size="9" fill="#94a3b8">Jaeger</text>
  <text x="192" y="464" text-anchor="middle" font-size="8" fill="#475569">:16686</text>

  <rect x="35" y="483" width="98" height="38" rx="5" fill="#1a1a1a" stroke="#64748b" stroke-width="1"/>
  <text x="84" y="498" text-anchor="middle" font-size="9" fill="#94a3b8">Prometheus</text>
  <text x="84" y="512" text-anchor="middle" font-size="8" fill="#475569">:9090</text>

  <rect x="143" y="483" width="98" height="38" rx="5" fill="#1a1a1a" stroke="#64748b" stroke-width="1"/>
  <text x="192" y="498" text-anchor="middle" font-size="9" fill="#94a3b8">Grafana</text>
  <text x="192" y="512" text-anchor="middle" font-size="8" fill="#475569">:3000</text>

  <rect x="35" y="531" width="210" height="26" rx="5" fill="#1a1a1a" stroke="#64748b" stroke-width="1"/>
  <text x="140" y="548" text-anchor="middle" font-size="9" fill="#64748b">Loki (:3100) — log aggregation</text>

  <!-- ══════════════ FLOW ARROWS ══════════════ -->

  <!-- Dev → ECR (build-and-push) -->
  <line x1="255" y1="140" x2="293" y2="137" stroke="#fb923c" stroke-width="2" class="fa" marker-end="url(#arr-o)"/>
  <text x="259" y="132" font-size="9" fill="#fb923c">push</text>

  <!-- Dev → AgentCore (deploy.sh) -->
  <line x1="255" y1="247" x2="355" y2="207" stroke="#4ade80" stroke-width="1.8" class="fa" marker-end="url(#arr-g)"/>
  <text x="275" y="233" font-size="9" fill="#4ade80">tf apply</text>

  <!-- ECR → AgentCore (pull) -->
  <line x1="362" y1="176" x2="362" y2="226" stroke="#fb923c" stroke-width="1.5" class="fa" marker-end="url(#arr-o)"/>
  <text x="368" y="208" font-size="9" fill="#fb923c">pull</text>

  <!-- AgentCore → Bedrock -->
  <line x1="445" y1="365" x2="375" y2="383" stroke="#4ade80" stroke-width="1.8" class="fa" marker-end="url(#arr-g)"/>

  <!-- AgentCore → Memory (from ADOT area upward) -->
  <line x1="790" y1="254" x2="817" y2="176" stroke="#c084fc" stroke-width="1.5" class="fa2" marker-end="url(#arr-p)"/>

  <!-- ADOT → X-Ray (OTLP traces) -->
  <line x1="720" y1="338" x2="560" y2="383" stroke="#fb923c" stroke-width="1.5" class="fa" marker-end="url(#arr-o)"/>
  <text x="632" y="368" font-size="8.5" fill="#fb923c">OTLP traces</text>

  <!-- ADOT → CloudWatch (OTLP logs) -->
  <line x1="800" y1="338" x2="800" y2="383" stroke="#4a9eff" stroke-width="1.5" class="fa" marker-end="url(#arr-b)"/>
  <text x="808" y="365" font-size="8.5" fill="#4a9eff">OTLP logs</text>

  <!-- Vended TRACES: AgentCore Runtime → X-Ray -->
  <line x1="540" y1="365" x2="565" y2="383" stroke="#fb923c" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arr-o)"/>
  <text x="500" y="376" font-size="8" fill="#fb923c">vended</text>

  <!-- Vended APPLICATION_LOGS: AgentCore Runtime → CloudWatch -->
  <line x1="850" y1="365" x2="850" y2="383" stroke="#4a9eff" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arr-b)"/>
  <text x="858" y="376" font-size="8" fill="#4a9eff">vended</text>

  <!-- Local app → OTel Collector -->
  <line x1="137" y1="388" x2="84" y2="435" stroke="#64748b" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arr)"/>
  <text x="85" y="415" font-size="8" fill="#475569">local profile</text>

  <!-- Version stamp -->
  <text x="1180" y="652" text-anchor="end" font-size="9" fill="#334155">generated 2026-04-12</text>
</svg>
